<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soporta al Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- ASEGÚRATE DE QUE ESTE SCRIPT SEA EL QUE TE DIO MONETAG EXACTAMENTE -->
	<script src="https://alwingulla.com/tag.min.js" data-zone="3327942" data-sdk="show_3327942"></script>
</head>
<body style="background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 50px 20px;">
    
    <div id="ad-container">
        <h2>Soporta al Bot para ver la señal</h2>
        <p id="status" style="color: #ccc;">Esperando al servidor de anuncios...</p>
        
        <!-- Botón de respaldo por si el auto-play falla -->
        <button id="retry-btn" onclick="playAd()" style="display:none; background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 16px; margin-top: 20px;">
            VER ANUNCIO AHORA
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        function playAd() {
            const status = document.getElementById('status');
            const btn = document.getElementById('retry-btn');

            if (typeof show_3327942 === 'function') {
                status.innerText = "Cargando anuncio...";
                btn.style.display = "none";

                show_3327942().then(() => {
                    status.innerText = "¡Gracias! Volviendo al bot...";
                    setTimeout(() => { tg.close(); }, 2000);
                }).catch((err) => {
                    status.innerText = "No hay anuncios disponibles en este momento.";
                    btn.style.display = "block";
                    btn.innerText = "REINTENTAR";
                });
            } else {
                status.innerText = "Error: El SDK de anuncios no cargó. Revisa si tienes un Bloqueador de Anuncios activo.";
                btn.style.display = "block";
                btn.innerText = "INTENTAR CARGAR DE NUEVO";
            }
        }

        // Intentar cargar automáticamente después de 2 segundos para dar tiempo al SDK
        setTimeout(playAd, 2000);
    </script>
</body>
</html>
